<!-- portify-logo.svg -->
<!-- Simple, clean SVG logo that works well at small sizes (16x16, 32x32) -->

<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="24" cy="24" r="24" fill="url(#gradient)" />
  
  <!-- Layer 3 (back) - subtle shadow -->
  <rect x="16" y="18" width="18" height="14" rx="2" fill="#000" opacity="0.1" transform="translate(1.5, 1.5) rotate(3 24 24)" />
  
  <!-- Layer 2 (middle) -->
  <rect x="16" y="18" width="18" height="14" rx="2" fill="#000" opacity="0.2" transform="translate(0.8, 0.8) rotate(1 24 24)" />
  
  <!-- Layer 1 (front) - main layer -->
  <rect x="16" y="18" width="18" height="14" rx="2" fill="url(#layerGradient)" />
  
  <!-- Portfolio icon (simplified layers symbol) -->
  <g stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.95">
    <path d="M24 20L18 23l6 3 6-3-6-3z" />
    <path d="M18 29l6 3 6-3" />
  </g>
  
  <!-- Gradients -->
  <defs>
    <!-- Background gradient -->
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Layer gradient -->
    <linearGradient id="layerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>